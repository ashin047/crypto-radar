const b2u = b => Uint8Array.from(atob(b), c=>c.charCodeAt(0));
async function unlock(pw){
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b2u(SALT), iterations:ITER, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b2u(IV)}, key, b2u(CT));
  const html = new TextDecoder().decode(pt);
  document.open(); document.write(html); document.close();
}
async function go(){
  const pw = document.getElementById("pw").value;
  const err = document.getElementById("err");
  err.textContent = "解密中…";
  try{
    if(document.getElementById("rem").checked) localStorage.setItem("radar_pw", pw);
    await unlock(pw);
  }catch(e){ err.textContent = "密碼錯誤"; localStorage.removeItem("radar_pw"); }
}
// 自動解鎖: 這台裝置記過密碼就直接進(密碼只存本機 localStorage, 不上傳)
(async()=>{
  const saved = localStorage.getItem("radar_pw");
  if(saved){
    document.getElementById("err").textContent = "自動解鎖中…";
    try{ await unlock(saved); }catch(e){ localStorage.removeItem("radar_pw"); document.getElementById("err").textContent=""; }
  }
})();
